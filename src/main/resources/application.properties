spring.application.name=VacParser
server.port=8080

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# --- Micrometer / Actuator / Prometheus ---
management.endpoints.web.exposure.include=health,info,prometheus,metrics,threaddump,heapdump,env,loggers
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always

# --- Micrometer Tracing + OpenTelemetry (Jaeger via Zipkin/OTLP) ---
# Включаем distributed tracing c полным сэмплингом для демонстраций
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

# Экспорт трейсов в Jaeger (через Zipkin-совместимый endpoint)
# Для докер-контейнера Jaeger `jaegertracing/all-in-one` можно пробросить порт 9411
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.zipkin.tracing.export.enabled=true